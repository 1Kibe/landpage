        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d0d;
        }

        /* Wrapper principal com borda interna */
        .page-frame {
            position: fixed;
            inset: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            overflow: hidden;
            background: #0d0d0d;
        }

        /* Fundo ASCII dither ocupa todo o frame */
        .ascii-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* Overlay escuro leve para legibilidade */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.18);
            z-index: 1;
            pointer-events: none;
        }

        /* ============================================
           NAVEGAÇÃO SUPERIOR
        ============================================ */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;

        }

        nav a:hover {

        }

        /* ============================================
           CONTEÚDO CENTRAL
        ============================================ */
        .hero {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: none;
        }

        .hero-number {

            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.55);

        }

        .hero-name {

            font-size: clamp(6rem, 14vw, 13rem);
            font-weight: 400;
            line-height: 0.9;
            color: #f5f0e8;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            text-shadow: 0 2px 40px rgba(0,0,0,0.5);
        }

        .hero-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.9;
            letter-spacing: 0.03em;
        }

        .hero-subtitle p {
            margin: 0;
        }

        /* ============================================
           BARRA INFERIOR
        ============================================ */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 36px;
        }

        .bottom-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .bottom-icons a {
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
        }

        .bottom-icons a:hover {
            color: #ffffff;
        }

        .bottom-icons svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .bottom-handle {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.55);
        }

        .bottom-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            padding: 8px 18px;
            transition: all 0.3s ease;
        }

        .bottom-cta:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.7);
            color: #ffffff;
        }

        .bottom-cta svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============================================
           ASCII DITHER — COVER (zoom sem distorção)
        ============================================ */
        [data-ascii-dither-bg] {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
        }

        /* ============================================
           RESPONSIVIDADE
        ============================================ */
        @media (max-width: 768px) {
            .page-frame {
                inset: 6px;
            }

            nav {
                padding: 20px 20px;
            }

            nav a {
                font-size: 0.62rem;
                letter-spacing: 0.1em;
            }

            .hero-name {
                font-size: clamp(4.5rem, 18vw, 7rem);
            }

            .bottom-bar {
                padding: 18px 20px;
            }

            .bottom-handle {
                display: none;
            }
        }

        @media (max-width: 480px) {
            nav a:not(:first-child):not(:last-child) {
                display: none;
            }

            .hero-name {
                font-size: clamp(4rem, 20vw, 6rem);
            }

            .hero-subtitle {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

    <!-- Script ASCII Dither Background -->
    <script src="./ascii-dither-background.js"></script>

    <script>
        (function () {
            function applyAsciiCover() {
                var mount = document.querySelector('[data-ascii-dither-bg]');
                if (!mount) return;
                var canvases = mount.querySelectorAll('canvas');
                var fw = mount.offsetWidth;
                var fh = mount.offsetHeight;
                canvases.forEach(function (c) {
                    var cw = c.width, ch = c.height;
                    if (!cw || !ch) return;
                    var scale = Math.max(fw / cw, fh / ch);
                    c.style.setProperty('position', 'absolute', 'important');
                    c.style.setProperty('top', '50%', 'important');
                    c.style.setProperty('left', '50%', 'important');
                    c.style.setProperty('width', (cw * scale) + 'px', 'important');
                    c.style.setProperty('height', (ch * scale) + 'px', 'important');
                    c.style.setProperty('max-width', 'none', 'important');
                    c.style.setProperty('max-height', 'none', 'important');
                    c.style.setProperty('transform', 'translate(-50%, -50%)', 'important');
                    c.style.setProperty('mask-image', 'none', 'important');
                    c.style.setProperty('-webkit-mask-image', 'none', 'important');
                });
            }
            // Aguarda o script inicializar e depois aplica
            setTimeout(applyAsciiCover, 400);
            window.addEventListener('resize', applyAsciiCover);
        })();
    </script>
